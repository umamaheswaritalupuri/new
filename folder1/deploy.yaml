apiVersion: apps/v1
kind: Deployment
metadata:
  name: test-deployment1
  labels:
    app: test-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: test-app
  template:
    metadata:
      labels:
        app: test-app
    spec:
      containers:
      - name: nginx
        image: dhi.io/tomcat:11-jdk25-debian-dev
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: test-nodeport-service1
spec:
  type: NodePort
  selector:
    app: test-app
  ports:
    - port: 8080         # Service port
      targetPort: 80   # Container port
      nodePort: 30080  # External port (range: 30000–32767)
